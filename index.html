<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوره عبدالرحمن الناصر | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #050b1a;
            --gold: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; background: var(--space-bg); color: white;
            font-family: 'Tajawal', sans-serif; overflow-x: hidden; scroll-behavior: smooth;
            min-height: 100vh;
        }

        /* خلفية النجوم - تأكدي أن هذا الجزء لم يتغير */
        #stars-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; background: #050b1a;
            overflow: hidden;
        }
        .star { 
            position: absolute; background: white; border-radius: 50%; 
            opacity: 0; animation: twinkle var(--duration) infinite ease-in-out; 
        }
        
        @keyframes twinkle { 
            0% { opacity: 0; transform: scale(0.5); } 
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #fff; } 
            100% { opacity: 0; transform: scale(0.5); } 
        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--space-bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; transition: 1s;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; display: none; position: relative; z-index: 10; }
        .card { background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; margin-bottom: 40px; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .gallery img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }

        .link-btn { display: inline-block; padding: 12px 30px; color: var(--gold); border: 2px solid var(--gold); text-decoration: none; border-radius: 50px; transition: 0.3s; font-weight: bold; }
        .link-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div id="welcome-screen">
        <h1 style="color: var(--gold); font-size: 3.5em;">نوره عبدالرحمن الناصر</h1>
        <p style="font-size: 1.5em; margin-bottom: 30px;">نصنع التأثير.. ونقود المحتوى</p>
        <button onclick="enterSite()" style="padding: 15px 40px; border-radius: 50px; cursor: pointer; background: transparent; color: var(--gold); border: 2px solid var(--gold); font-size: 1.2em;">دخول البورتفوليو</button>
    </div>

    <div class="container" id="mainContent">
        <header style="text-align: center; margin-bottom: 50px;">
            <h1 style="color: var(--gold); font-size: 3em;">نوره عبدالرحمن الناصر</h1>
        </header>

        <div class="card">
            <h2>الخبرة العملية</h2>
            <div class="gallery">
                <img src="./cma-1.jfif"> <img src="./cma-2.jfif"> <img src="./cma-logo.jfif"> <img src="./cma-3.jfif">
            </div>
        </div>

        <div class="card">
            <h2>القيادة وإدارة الفعاليات</h2>
            <p>مشروع ملتقى النقد الإعلامي وإدارة الفرق التنفيذية.</p>
            <div class="gallery">
                <img src="./criticism-event-2.jfif"> <img src="./criticism-event.jfif">
            </div>
            <!-- الرابط الذي طلبته نورة -->
            <div style="text-align: center; margin-top: 20px;">
                <a href="https://www.linkedin.com/posts/norah-alnasser-b2026919b_aetaesaesaeqaexabraepaesaeuaeqaexabraepaesaenaehaesaepaetaey-activity-7269363536244457472-7TxK" class="link-btn" target="_blank">شاهد تفاصيل المبادرة على LinkedIn 🔗</a>
            </div>
        </div>

        <footer style="text-align: center; padding: 40px; color: var(--gold);">
            <p>norahabdul15@gmail.com | Riyadh, Saudi Arabia</p>
        </footer>
    </div>

    <script>
        function enterSite() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 1000);
        }

        // إنشاء نجوم تلمع بكثافة عالية
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 300; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.setProperty('--duration', Math.random() * 2 + 1 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
